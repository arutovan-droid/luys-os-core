version: "0.1"
crystals:

  - id: "crystal.hunt_anomalies.v1"
    name: "Охота на аномалии"
    when_to_use:
      - "когда скучно"
      - "когда ум 'не цепляется' за реальность"
      - "когда нужно вернуть любопытство"
    steps:
      - "Возьми один обычный предмет рядом и назови его."
      - "Найди одну странную деталь (форма, след, запах, износ, несоответствие)."
      - "Сформулируй 3 вопроса к этой детали и 1 короткую историю/гипотезу."
    anti_pattern:
      - "скроллить/искать развлечения вместо исследования"
      - "пытаться 'быть умным' вместо того, чтобы быть внимательным"
    success_signal:
      - "появилось любопытство и желание продолжить"
      - "возникла хоть одна новая мысль/вопрос"
    rollback:
      - "если за 2 минуты нет аномалии — поменяй предмет или поменяй сенсорный канал (зрение→тактильность)."

  - id: "crystal.reduce_uncertainty.v1"
    name: "Снижение неопределённости"
    when_to_use:
      - "тревога"
      - "паралич выбора"
      - "страх будущего"
    steps:
      - "Запиши самый страшный сценарий одним конкретным предложением."
      - "Отметь: что я контролирую (минимум 1 пункт), что не контролирую (1 пункт)."
      - "Сделай один контролируемый шаг на 5 минут."
    anti_pattern:
      - "обобщать ('всё пропало')"
      - "прыгать к решению без определения триггера"
    success_signal:
      - "тревога снизилась хотя бы на 1/10"
      - "появился следующий шаг"
    rollback:
      - "если не снижается — переключись на телесный протокол и вернись через 10 минут."

  - id: "crystal.camera_fact.v1"
    name: "Камера-факт"
    when_to_use:
      - "конфликт"
      - "обида"
      - "злость"
    steps:
      - "Опиши сцену как камера: кто, где, что сказал/сделал (без оценок)."
      - "Отдельно выпиши интерпретацию (что я подумал)."
      - "Сформулируй границу и просьбу в 2 предложениях."
    anti_pattern:
      - "всегда/никогда"
      - "чтение мыслей"
    success_signal:
      - "есть 1 факт + 1 просьба без обвинения"
    rollback:
      - "если снова закипает — вернись к одной цитате и одному действию."

  - id: "crystal.criteria_map.v1"
    name: "Карта критериев убеждения"
    when_to_use:
      - "спор о 'докажи/опровергни'"
      - "философские провокации"
      - "поляризация"
    steps:
      - "Спроси: что будет считаться убедительным (пример допустимого доказательства)."
      - "Раздели критерии: логика / опыт / традиция / прагматика."
      - "Построй карту: где вы совпадаете, где нет."
    anti_pattern:
      - "спорить о выводах без согласия о критериях"
    success_signal:
      - "понятно, что именно спорят: факты или критерии"
    rollback:
      - "если человек не может назвать критерий — останься в мета-слое, не переходи к 'доказательствам'."
